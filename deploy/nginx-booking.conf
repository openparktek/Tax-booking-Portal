# OpenPark Booking Portal - Nginx Configuration
# Add this to the server block for portal.openpark.hu
# File: /etc/nginx/sites-enabled/portal.openpark.hu.conf

# Booking Portal - Static Frontend
location /booking/ {
    alias /opt/openpark-booking/build/;
    try_files $uri $uri/ /booking/index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Booking Portal - Backend API proxy
location /booking/api/ {
    proxy_pass http://127.0.0.1:3002/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
